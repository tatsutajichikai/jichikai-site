{% extends "base.html" %}
{% block content %}

<section class="auth-section">
  <div class="auth-box">
    <div class="auth-icon">🔑</div>
    <h2>パスワード変更</h2>
    <p class="auth-desc">ログイン中：<strong>{{ admin_name }}</strong> さん</p>

    {% if msg %}
      <div class="alert alert-{{ msg[0] }}">{{ msg[1] }}</div>
    {% endif %}

    <form method="POST" action="{{ url_for('admin1_change_password') }}">
      <div class="form-group">
        <label>現在のパスワード</label>
        <input type="password" name="current_password"
               placeholder="現在のパスワード" required autofocus>
      </div>
      <div class="form-group">
        <label>新しいパスワード</label>
        <input type="password" name="new_password"
               placeholder="新しいパスワード（4文字以上）" required>
      </div>
      <div class="form-group">
        <label>確認用パスワード</label>
        <input type="password" name="confirm_password"
               placeholder="もう一度入力" required>
      </div>
      <button type="submit" class="btn btn-full">変更する</button>
    </form>

    <div style="text-align:center; margin-top:16px;">
      <a href="{{ url_for('admin_dashboard') }}"
         class="btn btn-outline btn-sm">← ダッシュボードに戻る</a>
    </div>
  </div>
</section>

{% endblock %}
