<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>検証用ビューア</title>
  <style>
    body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; }
    .header { height: 50px; background: #2e7d32; color: white; display: flex; align-items: center; padding: 0 20px; }
    iframe { width: 100%; height: calc(100% - 50px); border: none; }
  </style>
</head>
<body>
  <div class="header">
    PDF検証表示（{{ display_name }}）
    <a href="{{ url_for('kyogiin_files', month='1月') }}" style="color:white; margin-left: auto;">← 戻る</a>
  </div>
  
  <!-- ブラウザ標準の機能でPDFを表示（embedタグ） -->
  <embed src="{{ file_url }}" type="application/pdf" width="100%" height="100%">
</body>
</html>
