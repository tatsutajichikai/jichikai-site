<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>{{ display_name }} - {{ company.name }}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <style>
    {% if not allow_print %}
    @media print { html, body { display: none !important; } }
    {% endif %}

    /* スマホでのスクロールを許可するために overflow: hidden を削除 */
    body { 
        margin: 0; 
        background: #333; 
        user-select: none; 
        overflow-x: hidden;
        overflow-y: auto;
    }

    .viewer-header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 300;
      background: var(--green);
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 20px; height: 52px; gap: 10px;
    }
    .viewer-header .title {
      color: #fff; font-weight: bold; font-size: .95rem;
      flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .viewer-header-btns { display: flex; gap: 8px; flex-shrink: 0; }
    .viewer-header a, .viewer-header button {
      color: rgba(255,255,255,.85); font-size: .85rem;
      padding: 5px 14px; border: 1px solid rgba(255,255,255,.4);
      border-radius: 4px; text-decoration: none;
      background: transparent; cursor: pointer;
    }

    .viewer-body {
      margin-top: 52px;
      width: 100%; 
      /* スマホでの高さ確保 */
      min-height: calc(100vh - 52px);
      position: relative;
      background: #525659;
      display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
    }

    /* PDF表示用：スマホ対応強化 */
    .pdf-frame {
      width: 100%; 
      height: calc(100vh - 52px); 
      border: none;
      display: block;
    }

    /* iOS/スマホでiframe内のPDFをスクロールさせるためのおまじない */
    @media screen and (max-width: 768px) {
        .viewer-body {
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        .pdf-frame {
            height: 90vh; /* 少し高さを固定 */
        }
        .mobile-open-btn {
            display: block !important;
            margin: 10px;
            background: #fff !important;
            color: #333 !important;
            font-weight: bold;
        }
    }

    .mobile-open-btn { display: none; }

    /* 画像表示用：画面にフィットさせる */
    .image-content {
      max-width: 100%; max-height: 100%;
      object-fit: contain;
    }

    .watermark-overlay {
      position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none; z-index: 200; overflow: hidden;
    }
    .watermark-text {
      position: absolute; white-space: nowrap;
      font-size: 24px; font-weight: bold;
      color: rgba(180, 0, 0, 0.15);
      transform: rotate(-35deg);
      user-select: none;
    }
  </style>
</head>
<body
  {% if not allow_print %}
  oncontextmenu="return false;"
  ondragstart="return false;"
  onselectstart="return false;"
  {% endif %}>

  <div class="viewer-header">
    <span class="title">📄 {{ display_name }}</span>
    <div class="viewer-header-btns">
      {% if allow_download %}
      <a href="{{ file_url }}?dl=1" download="{{ display_name }}">⬇️</a>
      {% endif %}
      <a href="{{ url_for('kyogiin_files', month=back_month) }}">← 戻る</a>
    </div>
  </div>

  <div class="viewer-body">
    <!-- スマホで閲覧できない場合の回避策ボタン -->
    {% if file_ext == 'pdf' %}
    <a href="{{ file_url }}" target="_blank" class="mobile-open-btn viewer-header a">全画面で表示する</a>
    {% endif %}

    {% if file_ext == 'pdf' %}
      <iframe class="pdf-frame" src="{{ file_url }}#toolbar=0" title="PDF Viewer"></iframe>
    {% elif file_ext in ['jpg', 'jpeg', 'png', 'gif', 'webp'] %}
      <img src="{{ file_url }}" class="image-content" alt="{{ display_name }}">
    {% endif %}

    {% if watermark or file_type == 'gijiroku' %}
    <div class="watermark-overlay" id="watermarkOverlay"></div>
    {% endif %}
  </div>

  <script>
    {% if not allow_print %}
    document.addEventListener("keydown", function(e) {
      if ((e.ctrlKey && (e.key === "p" || e.key === "s" || e.key === "u")) || e.key === "F12") {
        e.preventDefault();
        return false;
      }
    });
    {% endif %}

    {% if watermark or file_type == 'gijiroku' %}
    (function() {
      const overlay = document.getElementById("watermarkOverlay");
      if (!overlay) return;
      
      const userName = {{ user_name | tojson }};
      const now = new Date();
      const dateStr = `${now.getFullYear()}/${String(now.getMonth()+1).padStart(2,'0')}/${String(now.getDate()).padStart(2,'0')}`;
      const waterText = `${userName} ${dateStr}`;

      const cols = 4;
      const rows = 10; // 透かしが足りなくなるのを防ぐために増加
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          const el = document.createElement("div");
          el.className = "watermark-text";
          el.textContent = waterText;
          el.style.left = (c * 30) + "%";
          el.style.top  = (r * 15) + "%";
          overlay.appendChild(el);
        }
      }
    })();
    {% endif %}
  </script>
</body>
</html>
