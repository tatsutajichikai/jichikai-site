<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>{{ display_name }} - {{ company.name }}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <style>
    {% if not allow_print %}
    @media print { html, body { display: none !important; } }
    {% endif %}

    body { 
        margin: 0; 
        background: #333; 
        user-select: none; 
        overflow: hidden; /* PCでの余計なスクロールを防止 */
        height: 100vh;
    }

    .viewer-header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 300;
      background: var(--green);
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 20px; height: 52px; gap: 10px;
    }
    .viewer-header .title {
      color: #fff; font-weight: bold; font-size: .95rem;
      flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .viewer-header-btns { display: flex; gap: 8px; flex-shrink: 0; }
    .viewer-header a {
      color: rgba(255,255,255,.85); font-size: .85rem;
      padding: 5px 14px; border: 1px solid rgba(255,255,255,.4);
      border-radius: 4px; text-decoration: none;
      background: transparent;
    }

    .viewer-body {
      margin-top: 52px;
      width: 100%; 
      height: calc(100vh - 52px);
      position: relative;
      background: #525659;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* PDF表示用：PCで安定する設定 */
    .pdf-frame {
      width: 100%; 
      height: 100%;
      border: none;
      display: block;
    }

    /* スマホ用：PDFがスクロールできない場合の救済ボタン */
    .mobile-notice {
        display: none;
        background: #fffbe6;
        padding: 10px;
        text-align: center;
        font-size: 0.85rem;
        border-bottom: 1px solid #ffe58f;
    }

    @media screen and (max-width: 768px) {
        .mobile-notice { display: block; }
        /* スマホのみ、iframeの親要素でスクロールを許可 */
        .viewer-body { overflow-y: auto; -webkit-overflow-scrolling: touch; }
        .pdf-frame { height: 85vh; } /* 完全にスクロールできないiOS向けの高さ確保 */
    }

    .image-content {
      max-width: 100%; max-height: 100%;
      object-fit: contain; margin: auto;
    }

    /* 透かし：密度を上げる */
    .watermark-overlay {
      position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none; z-index: 200; overflow: hidden;
    }
    .watermark-text {
      position: absolute; white-space: nowrap;
      font-size: 18px; font-weight: bold;
      color: rgba(180, 0, 0, 0.12);
      transform: rotate(-35deg);
      user-select: none;
    }
  </style>
</head>
<body
  {% if not allow_print %}
  oncontextmenu="return false;"
  ondragstart="return false;"
  onselectstart="return false;"
  {% endif %}>

  <div class="viewer-header">
    <span class="title">📄 {{ display_name }}</span>
    <div class="viewer-header-btns">
      {% if allow_download %}
      <a href="{{ file_url }}?dl=1" download="{{ display_name }}">⬇️</a>
      {% endif %}
      <a href="{{ url_for('kyogiin_files', month=back_month) }}">← 戻る</a>
    </div>
  </div>

  <div class="viewer-body">
    {% if file_ext == 'pdf' %}
      <div class="mobile-notice">
          スマホで全ページ見れない場合は <a href="{{ file_url }}" target="_blank" style="color: #1890ff; text-decoration: underline;">ここをタップしてPDFを直接開く</a>
      </div>
      <iframe class="pdf-frame" src="{{ file_url }}#toolbar=0" title="PDF Viewer"></iframe>
    {% elif file_ext in ['jpg', 'jpeg', 'png', 'gif', 'webp'] %}
      <img src="{{ file_url }}" class="image-content" alt="{{ display_name }}">
    {% endif %}

    {% if watermark or file_type == 'gijiroku' %}
    <div class="watermark-overlay" id="watermarkOverlay"></div>
    {% endif %}
  </div>

  <script>
    {% if not allow_print %}
    document.addEventListener("keydown", function(e) {
      if ((e.ctrlKey && (e.key === "p" || e.key === "s" || e.key === "u")) || e.key === "F12") {
        e.preventDefault();
        return false;
      }
    });
    {% endif %}

    {% if watermark or file_type == 'gijiroku' %}
    (function() {
      const overlay = document.getElementById("watermarkOverlay");
      if (!overlay) return;
      overlay.innerHTML = '';
      
      const userName = {{ user_name | tojson }};
      const now = new Date();
      const dateStr = `${now.getFullYear()}/${String(now.getMonth()+1).padStart(2,'0')}/${String(now.getDate()).padStart(2,'0')}`;
      const waterText = `${userName} ${dateStr}`;

      // 密度を上げるためにループ回数を増やし、間隔を狭める
      const cols = 5; 
      const rows = 12; 
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          const el = document.createElement("div");
          el.className = "watermark-text";
          el.textContent = waterText;
          el.style.left = (c * 25) - 10 + "%"; // 重なりを出すために少し左に寄せる
          el.style.top  = (r * 10) + "%";
          overlay.appendChild(el);
        }
      }
    })();
    {% endif %}
  </script>
</body>
</html>
